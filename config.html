<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELO | Configurações</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            background-image: radial-gradient(circle at center, #0d0d0d 0%, #000000 70%);
            color: #ffffff;
            min-height: 100vh;
        }

        :root {
            --gold: #d4af37;
            --gold-bright: #f9e295;
            --dark-box: #0a0a0a;
            --border-style: 1px solid rgba(212, 175, 55, 0.3);
        }

        header {
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid;
            border-image: linear-gradient(to right, transparent, var(--gold), transparent) 1;
        }

        .logo-area a img {
            height: 35px;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-back:hover {
            background: var(--gold);
            color: #000;
        }

        .main-content {
            padding-top: 100px;
            max-width: 800px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 60px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .page-title p {
            color: #888;
        }

        .settings-section {
            background: var(--dark-box);
            border: var(--border-style);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .settings-section h2 {
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .current-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #000;
            margin-bottom: 20px;
            overflow: hidden;
            border: 3px solid var(--gold);
        }

        .current-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload {
            position: relative;
        }

        .avatar-upload input[type="file"] {
            display: none;
        }

        .avatar-upload label {
            display: inline-block;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .avatar-upload label:hover {
            background: var(--gold);
            color: #000;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn-save {
            background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 50%, #b8941f 100%);
            color: #000;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(50, 200, 50, 0.15);
            border: 1px solid rgba(50, 200, 50, 0.5);
            color: #50c850;
        }

        .alert-error {
            background: rgba(200, 50, 50, 0.15);
            border: 1px solid rgba(200, 50, 50, 0.5);
            color: #ff6b6b;
        }

        footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            font-size: 0.75rem;
            color: #666;
        }

        footer a {
            color: #999;
            text-decoration: underline;
            margin: 0 8px;
        }

        footer a:hover {
            color: var(--gold);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="home.html"><img src="imagens/LOGO ELO FINAL.png" alt="ELO"></a>
        </div>
        <a href="home.html" class="btn-back">← Voltar</a>
    </header>

    <div class="main-content">
        <div class="page-title">
            <h1>Configurações</h1>
            <p>Gerencie suas informações pessoais</p>
        </div>

        <div class="alert alert-success" id="successAlert">Alterações salvas com sucesso!</div>
        <div class="alert alert-error" id="errorAlert">Erro ao salvar. Tente novamente.</div>

        <div class="settings-section">
            <h2>📷 Foto de Perfil</h2>
            <div class="avatar-section">
                <div class="current-avatar" id="avatarPreview">?</div>
                <div class="avatar-upload">
                    <input type="file" id="avatarInput" accept="image/*">
                    <label for="avatarInput">Escolher Foto</label>
                </div>
            </div>
        </div>

        <div class="settings-section">
            <h2>👤 Informações Pessoais</h2>
            <form id="profileForm">
                <div class="form-group">
                    <label for="fullName">Nome Completo</label>
                    <input type="text" id="fullName" placeholder="Seu nome completo">
                </div>

                <div class="form-group">
                    <label for="bio">Bio (apresentação)</label>
                    <textarea id="bio" placeholder="Conte um pouco sobre você..."></textarea>
                </div>
            </form>
        </div>

        <div class="settings-section">
            <h2>🔐 Segurança</h2>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" disabled>
                <small style="color: #555; font-size: 11px; margin-top: 5px; display: block;">O e-mail não pode ser alterado.</small>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button type="button" class="btn-save" id="saveBtn">Salvar Alterações</button>
        </div>
    </div>

    <footer>
        &copy; 2026 ELO - <a href="sobre.html">Sobre o ELO</a> - <a href="seguranca.html">Centro de Segurança</a> - <a href="privacidade.html">Privacidade</a> - <a href="termos.html">Termos</a>
    </footer>

    <script src="config.js"></script>
    <script>
        let currentUser = null;
        let selectedFile = null;

        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;

            document.getElementById('email').value = user.email;
            document.getElementById('fullName').value = user.user_metadata?.full_name || '';

            const initial = (user.user_metadata?.full_name || '?').charAt(0).toUpperCase();
            document.getElementById('avatarPreview').textContent = initial;

            const { data: perfil } = await supabaseClient
                .from('perfis')
                .select('bio, avatar_url')
                .eq('id', user.id)
                .single();

            if (perfil) {
                document.getElementById('bio').value = perfil.bio || '';
                if (perfil.avatar_url) {
                    document.getElementById('avatarPreview').innerHTML = `<img src="${perfil.avatar_url}" alt="Avatar">`;
                }
            }
        }

        function resizeImage(file, maxWidth = 400, maxHeight = 400, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            if (blob.size > 2 * 1024 * 1024) {
                                resolve(resizeImage(file, maxWidth - 50, maxHeight - 50, quality - 0.1));
                            } else {
                                const resizedFile = new File([blob], file.name, { type: file.type });
                                resolve(resizedFile);
                            }
                        }, file.type, quality);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const preview = document.getElementById('avatarPreview');
            preview.innerHTML = '<span style="font-size: 12px; color: #888;">Processando...</span>';

            try {
                selectedFile = await resizeImage(file);
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(selectedFile);
            } catch (err) {
                alert('Erro ao processar imagem');
                preview.innerHTML = '?';
            }
        });

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const saveBtn = document.getElementById('saveBtn');
            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');

            saveBtn.disabled = true;
            saveBtn.textContent = 'Salvando...';
            successAlert.classList.remove('show');
            errorAlert.classList.remove('show');

            try {
                let avatarUrl = null;

                if (selectedFile) {
                    try {
                        const fileExt = selectedFile.name.split('.').pop();
                        const fileName = `${currentUser.id}/avatar.${fileExt}`;

                        const { data: uploadData, error: uploadError } = await supabaseClient.storage
                            .from('avatars')
                            .upload(fileName, selectedFile, { upsert: true });

                        if (uploadError) {
                            console.error('Erro upload:', uploadError);
                            alert('Aviso: Não foi possível fazer upload da foto. Os outros dados serão salvos.');
                        } else {
                            const { data: urlData } = supabaseClient.storage
                                .from('avatars')
                                .getPublicUrl(fileName);
                            avatarUrl = urlData.publicUrl;
                        }
                    } catch (uploadErr) {
                        console.error('Erro no upload:', uploadErr);
                    }
                }

                const { error: perfilError } = await supabaseClient
                    .from('perfis')
                    .upsert({
                        id: currentUser.id,
                        nome_completo: document.getElementById('fullName').value,
                        bio: document.getElementById('bio').value,
                        avatar_url: avatarUrl
                    }, { onConflict: 'id' });

                if (perfilError) {
                    throw new Error('Erro ao salvar perfil: ' + perfilError.message);
                }

                await supabaseClient.auth.updateUser({
                    data: { full_name: document.getElementById('fullName').value }
                });

                successAlert.classList.add('show');
                setTimeout(() => successAlert.classList.remove('show'), 3000);

            } catch (err) {
                errorAlert.textContent = err.message;
                errorAlert.classList.add('show');
            }

            saveBtn.disabled = false;
            saveBtn.textContent = 'Salvar Alterações';
        });

        loadProfile();
    </script>

</body>
</html>
