<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELO | Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #000000; background-image: radial-gradient(circle at center, #0d0d0d 0%, #000000 70%); color: #ffffff; min-height: 100vh; }
        :root { --gold: #d4af37; --gold-bright: #f9e295; --dark-box: #0a0a0a; --border-style: 1px solid rgba(212, 175, 55, 0.3); }

        header { padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid; border-image: linear-gradient(to right, transparent, var(--gold), transparent) 1; }
        .logo-area a img { height: 35px; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6)); }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 18px; overflow: hidden; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { color: #ccc; font-size: 14px; }
        .user-badge { background: var(--gold); color: #000; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; display: none; }
        .user-badge.visible { display: inline; }
        .btn-logout { background: transparent; border: 1px solid #666; color: #ccc; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-logout:hover { border-color: #c00; color: #c00; }

        .main-content { display: flex; padding-top: 80px; min-height: calc(100vh - 80px); }
        .sidebar { width: 260px; padding: 30px 15px; border-right: 1px solid rgba(255,255,255,0.05); position: fixed; height: calc(100vh - 80px); overflow-y: auto; }

        .sidebar-section { margin-bottom: 25px; }
        .sidebar-title { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; padding-left: 15px; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 3px; }
        .sidebar-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; color: #888; text-decoration: none; border-radius: 8px; transition: all 0.3s; font-size: 14px; cursor: pointer; }
        .sidebar-menu a:hover { background: rgba(212, 175, 55, 0.1); color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .sidebar-menu a.active { background: rgba(212, 175, 55, 0.15); color: var(--gold); }
        .sidebar-menu a .icon { font-size: 18px; }

        .admin-section { display: none; }
        .admin-section.visible { display: block; }
        .admin-menu a { color: var(--gold) !important; border-left: 3px solid var(--gold); }
        .admin-menu a:hover { background: rgba(212, 175, 55, 0.2) !important; }

        .content-area { flex: 1; margin-left: 260px; padding: 30px; min-height: calc(100vh - 80px); }
        
        .section-title { color: var(--gold); font-size: 1.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }
        .section-title .icon { font-size: 2rem; }

        .welcome-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 30px; }
        .welcome-card h1 { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }
        .welcome-card p { color: #888; font-size: 1rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 25px; text-align: center; transition: all 0.3s; cursor: pointer; }
        .stat-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .stat-card h3 { color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; }
        .stat-card p { color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .communities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .community-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; overflow: hidden; transition: all 0.3s; }
        .community-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .community-cover { height: 120px; background: linear-gradient(135deg, var(--gold) 0%, #1a1a1a 100%); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .community-info { padding: 20px; }
        .community-info h3 { color: var(--gold); margin-bottom: 8px; font-size: 1.1rem; }
        .community-info p { color: #666; font-size: 0.85rem; margin-bottom: 15px; }
        .btn-participate { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .btn-participate:hover { filter: brightness(1.1); transform: scale(1.05); }

        .feed-list { display: flex; flex-direction: column; gap: 20px; }
        .scrap-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 25px; position: relative; }
        .scrap-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .scrap-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; overflow: hidden; }
        .scrap-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .scrap-user { flex: 1; }
        .scrap-user-name { color: var(--gold); font-weight: bold; font-size: 14px; }
        .scrap-time { color: #555; font-size: 12px; }
        .scrap-content { color: #ccc; font-size: 14px; line-height: 1.6; }
        .scrap-actions { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .scrap-action { background: none; border: none; color: #555; font-size: 12px; cursor: pointer; transition: color 0.3s; }
        .scrap-action:hover { color: var(--gold); }
        .scrap-delete { display: none; position: absolute; top: 15px; right: 15px; background: transparent; border: 1px solid #c00; color: #c00; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .scrap-delete.visible { display: block; }
        .scrap-delete:hover { background: #c00; color: #fff; }

        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .photo-item { aspect-ratio: 1; background: var(--dark-box); border: var(--border-style); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2rem; }
        .photo-item:hover { border-color: var(--gold); transform: scale(1.02); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        .empty-state { text-align: center; padding: 60px 20px; color: #555; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .empty-state h3 { color: #666; margin-bottom: 10px; }
        .empty-state p { font-size: 0.9rem; }

        .btn-create { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; }
        .btn-create:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--dark-box); border: 2px solid var(--gold); border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        .modal-close:hover { color: var(--gold); }
        .modal h2 { color: var(--gold); margin-bottom: 25px; font-size: 1.5rem; }
        .modal .form-group { margin-bottom: 20px; }
        .modal .form-group label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 8px; }
        .modal .form-group input, .modal .form-group textarea, .modal .form-group select { width: 100%; padding: 12px 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 14px; }
        .modal .form-group textarea { min-height: 80px; resize: vertical; }
        .modal .form-group input:focus, .modal .form-group textarea:focus, .modal .form-group select:focus { border-color: var(--gold); outline: none; }
        .modal .btn-save { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 14px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }
        .modal .btn-save:hover { filter: brightness(1.1); }

        .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; }
        .alert.show { display: block; }
        .alert-success { background: rgba(50, 200, 50, 0.15); border: 1px solid rgba(50, 200, 50, 0.5); color: #50c850; }
        .alert-error { background: rgba(200, 50, 50, 0.15); border: 1px solid rgba(200, 50, 50, 0.5); color: #ff6b6b; }

        .new-scrap-form { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .new-scrap-form textarea { width: 100%; min-height: 80px; padding: 15px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; resize: vertical; margin-bottom: 15px; }
        .new-scrap-form textarea:focus { border-color: var(--gold); outline: none; }
        .new-scrap-form button { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.75rem; color: #666; margin-left: 260px; }
        footer a { color: #999; text-decoration: underline; margin: 0 8px; }
        footer a:hover { color: var(--gold); }

        @media (max-width: 800px) { .sidebar { display: none; } .content-area { margin-left: 0; } footer { margin-left: 0; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="#" onclick="loadSection('home'); return false;"><img src="imagens/LOGO ELO FINAL.png" alt="ELO"></a>
        </div>
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">?</div>
            <span class="user-name" id="userName">Carregando...</span>
            <span class="user-badge" id="userBadge">Admin</span>
            <button class="btn-logout" id="logoutBtn">Sair</button>
        </div>
    </header>

    <div class="main-content">
        <nav class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Menu</div>
                <ul class="sidebar-menu">
                    <li><a href="#" onclick="loadSection('home'); return false;" class="active" data-section="home"><span class="icon">🏠</span> Início</a></li>
                    <li><a href="#" onclick="loadSection('comunidades'); return false;" data-section="comunidades"><span class="icon">👥</span> Comunidades</a></li>
                    <li><a href="#" onclick="loadSection('recados'); return false;" data-section="recados"><span class="icon">📝</span> Recados</a></li>
                    <li><a href="#" onclick="loadSection('fotos'); return false;" data-section="fotos"><span class="icon">📷</span> Fotos</a></li>
                </ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Pessoal</div>
                <ul class="sidebar-menu">
                    <li><a href="#" onclick="loadSection('config'); return false;" data-section="config"><span class="icon">⚙️</span> Configurações</a></li>
                    <li><a href="#" onclick="loadSection('privacidade'); return false;" data-section="privacidade"><span class="icon">🔒</span> Privacidade</a></li>
                </ul>
            </div>
            <div class="sidebar-section admin-section" id="adminSection">
                <div class="sidebar-title">⚠️ Administração</div>
                <ul class="sidebar-menu admin-menu">
                    <li><a href="#" onclick="loadSection('admin'); return false;" data-section="admin"><span class="icon">🛡️</span> Painel de Controle</a></li>
                </ul>
            </div>
        </nav>

        <main class="content-area" id="mainContent"></main>
    </div>

    <div class="modal" id="createCommunityModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>🏘️ Criar Nova Comunidade</h2>
            <form id="createCommunityForm">
                <div class="form-group">
                    <label>Nome da Comunidade *</label>
                    <input type="text" id="communityName" placeholder="Ex: Música Clássica" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="communityDesc" placeholder="Qual o objetivo da comunidade?"></textarea>
                </div>
                <div class="form-group">
                    <label>URL da Imagem de Capa</label>
                    <input type="url" id="communityImage" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="communityCategory">
                        <option value="outros">Outros</option>
                        <option value="musica">🎵 Música</option>
                        <option value="dev">💻 Desenvolvimento</option>
                        <option value="games">🎮 Games</option>
                        <option value="filmes">🎬 Filmes</option>
                        <option value="livros">📚 Livros</option>
                        <option value="esportes">⚽ Esportes</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">Criar Comunidade</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 ELO - <a href="sobre.html">Sobre</a> - <a href="seguranca.html">Segurança</a> - <a href="privacidade.html">Privacidade</a> - <a href="termos.html">Termos</a>
    </footer>

    <script src="config.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            currentUser = user;

            let perfil = await ensureProfile(user);
            isAdmin = perfil?.is_admin || false;
            
            const fullName = perfil?.nome_completo || user.user_metadata?.full_name || user.email;
            const firstName = fullName.split(' ')[0];
            const avatarUrl = perfil?.avatar_url;

            document.getElementById('userName').textContent = fullName;
            const avatarEl = document.getElementById('userAvatar');
            if (avatarUrl) {
                avatarEl.innerHTML = `<img src="${avatarUrl}" alt="Avatar">`;
            } else {
                avatarEl.textContent = firstName.charAt(0).toUpperCase();
            }

            if (isAdmin) {
                document.getElementById('userBadge').classList.add('visible');
                document.getElementById('adminSection').classList.add('visible');
            }

            loadSection('home');
        }

        async function ensureProfile(user) {
            const { data: perfil, error } = await supabaseClient.from('perfis').select('*').eq('id', user.id).single();
            if (error || !perfil) {
                const fullName = user.user_metadata?.full_name || user.email;
                const { data: newPerfil } = await supabaseClient.from('perfis').insert({ id: user.id, nome_completo: fullName, is_admin: false }).select().single();
                return newPerfil || { is_admin: false, nome_completo: fullName };
            }
            return perfil;
        }

        function loadSection(section) {
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar-menu a[data-section="${section}"]`);
            if (activeLink) activeLink.classList.add('active');

            const content = document.getElementById('mainContent');
            
            switch(section) {
                case 'home': loadHome(); break;
                case 'comunidades': loadComunidades(); break;
                case 'recados': loadRecados(); break;
                case 'fotos': loadFotos(); break;
                case 'config': window.location.href = 'config.html'; break;
                case 'admin': window.location.href = 'admin.html'; break;
                default: loadHome();
            }
        }

        async function loadHome() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const perfil = await ensureProfile(user);
            const firstName = (perfil?.nome_completo || user.user_metadata?.full_name || 'Usuário').split(' ')[0];

            let statsHtml = '';
            if (isAdmin) {
                const { count: userCount } = await supabaseClient.from('perfis').select('*', { count: 'exact', head: true });
                const { count: scrapCount } = await supabaseClient.from('recados').select('*', { count: 'exact', head: true });
                const { count: communityCount } = await supabaseClient.from('comunidades').select('*', { count: 'exact', head: true });
                statsHtml = `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>${userCount || 0}</h3><p>Usuários</p></div>
                        <div class="stat-card"><h3>${communityCount || 0}</h3><p>Comunidades</p></div>
                        <div class="stat-card"><h3>${scrapCount || 0}</h3><p>Recados</p></div>
                    </div>`;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="welcome-card">
                    <h1>Olá, ${firstName}!</h1>
                    <p>Bem-vindo ao ELO. Explore comunidades, faça conexões e compartilhe conhecimento.</p>
                </div>
                ${statsHtml}
                <div class="section-title"><span class="icon">📝</span> Recados Recentes</div>
                <div id="recentRecados"></div>
            `;
            loadRecentRecados();
        }

        async function loadRecentRecados() {
            const { data: recados } = await supabaseClient.from('recados').select('*, perfis(avatar_url, nome_completo)').order('created_at', { ascending: false }).limit(5);
            const container = document.getElementById('recentRecados');
            
            if (!recados || recados.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>Nenhum recado ainda</h3><p>Seja o primeiro a escrever algo!</p></div>`;
                return;
            }

            container.innerHTML = '<div class="feed-list">' + recados.map(r => createScrapCard(r)).join('') + '</div>';
        }

        async function loadComunidades() {
            document.getElementById('mainContent').innerHTML = `
                <div class="section-title"><span class="icon">👥</span> Comunidades</div>
                <button class="btn-create" onclick="openModal()">➕ Criar Nova Comunidade</button>
                <div id="communitiesGrid" class="communities-grid"></div>
            `;
            
            const { data: comunidades, error } = await supabaseClient.from('comunidades').select('*').order('created_at', { ascending: false });
            const grid = document.getElementById('communitiesGrid');

            if (error) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Erro ao carregar</h3><p>${error.message}</p></div>`;
                return;
            }

            if (!comunidades || comunidades.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">🏘️</div><h3>Nenhuma comunidade ainda</h3><p>Seja o primeiro a criar uma comunidade!</p></div>`;
                return;
            }

            grid.innerHTML = comunidades.map(c => `
                <div class="community-card">
                    <div class="community-cover">${c.icone || '👥'}</div>
                    <div class="community-info">
                        <h3>${c.nome}</h3>
                        <p>${c.descricao || ''}</p>
                        <button class="btn-participate" onclick="participarComunidade('${c.id}')">Participar</button>
                    </div>
                </div>
            `).join('');
        }

        function openModal() {
            document.getElementById('createCommunityModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('createCommunityModal').classList.remove('show');
        }

        document.getElementById('createCommunityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('communityName').value.trim();
            const descricao = document.getElementById('communityDesc').value.trim();
            const imagem_url = document.getElementById('communityImage').value.trim();
            const categoria = document.getElementById('communityCategory').value;

            if (!nome) {
                alert('O nome da comunidade é obrigatório!');
                return;
            }

            const icones = { musica: '🎵', dev: '💻', games: '🎮', filmes: '🎬', livros: '📚', esportes: '⚽' };
            const icone = icones[categoria] || '👥';

            const { error } = await supabaseClient.from('comunidades').insert({
                nome: nome,
                descricao: descricao,
                imagem_url: imagem_url || null,
                icone: icone,
                categoria: categoria,
                criado_por: currentUser.id
            });

            if (error) {
                alert('Erro ao criar comunidade: ' + error.message);
            } else {
                closeModal();
                document.getElementById('createCommunityForm').reset();
                loadComunidades();
            }
        });

        async function loadRecados() {
            document.getElementById('mainContent').innerHTML = `
                <div class="section-title"><span class="icon">📝</span> Recados</div>
                <div class="alert alert-success" id="scrapAlert"></div>
                <div class="new-scrap-form">
                    <textarea id="scrapText" placeholder="Escreva algo para a comunidade..."></textarea>
                    <button onclick="postScrap()">Publicar</button>
                </div>
                <div id="recadosList"></div>
            `;
            
            const { data: recados } = await supabaseClient.from('recados').select('*, perfis(avatar_url, nome_completo)').order('created_at', { ascending: false });
            const list = document.getElementById('recadosList');

            if (!recados || recados.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>Nenhum recado ainda</h3><p>Seja o primeiro a escrever algo!</p></div>`;
                return;
            }

            list.innerHTML = '<div class="feed-list">' + recados.map(r => createScrapCard(r)).join('') + '</div>';
        }

        function createScrapCard(recado) {
            const perfil = recado.perfis || {};
            const avatar = perfil.avatar_url || null;
            const nome = perfil.nome_completo || 'Usuário';
            const initial = nome.charAt(0).toUpperCase();
            const time = new Date(recado.created_at).toLocaleDateString('pt-BR');
            const avatarHtml = avatar ? `<img src="${avatar}" alt="${nome}">` : initial;
            const deleteBtn = isAdmin ? `<button class="scrap-delete visible" onclick="deleteScrap('${recado.id}')">🗑️ Excluir</button>` : '';

            return `
                <div class="scrap-card">
                    ${deleteBtn}
                    <div class="scrap-header">
                        <div class="scrap-avatar">${avatarHtml}</div>
                        <div class="scrap-user">
                            <div class="scrap-user-name">${nome}</div>
                            <div class="scrap-time">${time}</div>
                        </div>
                    </div>
                    <div class="scrap-content">${recado.conteudo}</div>
                    <div class="scrap-actions">
                        <button class="scrap-action">❤️ Curtir</button>
                        <button class="scrap-action">💬 Comentar</button>
                    </div>
                </div>
            `;
        }

        async function postScrap() {
            const text = document.getElementById('scrapText').value.trim();
            if (!text) return;

            const { error } = await supabaseClient.from('recados').insert({
                usuario_id: currentUser.id,
                conteudo: text
            });

            if (error) {
                showAlert('Erro ao postar: ' + error.message, 'error');
            } else {
                document.getElementById('scrapText').value = '';
                showAlert('Recado publicado!', 'success');
                loadRecados();
            }
        }

        async function deleteScrap(id) {
            if (!confirm('Excluir este recado?')) return;
            await supabaseClient.from('recados').delete().eq('id', id);
            loadRecados();
        }

        async function loadFotos() {
            document.getElementById('mainContent').innerHTML = `
                <div class="section-title"><span class="icon">📷</span> Fotos</div>
                <div class="photos-grid" id="photosGrid"></div>
            `;

            const { data: fotos } = await supabaseClient.from('fotos').select('*').eq('usuario_id', currentUser.id).order('created_at', { ascending: false });
            const grid = document.getElementById('photosGrid');

            if (!fotos || fotos.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📷</div><h3>Nenhuma foto ainda</h3><p>Suas fotos aparecerão aqui!</p></div>`;
                return;
            }

            grid.innerHTML = fotos.map(f => `<div class="photo-item"><img src="${f.url}" alt="Foto"></div>`).join('');
        }

        function showAlert(message, type) {
            const alert = document.getElementById('scrapAlert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });

        init();
    </script>

</body>
</html>
