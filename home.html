<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELO | Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #000000; background-image: radial-gradient(circle at center, #0d0d0d 0%, #000000 70%); color: #ffffff; min-height: 100vh; }
        :root { --gold: #d4af37; --gold-bright: #f9e295; --dark-box: #0a0a0a; --border-style: 1px solid rgba(212, 175, 55, 0.3); }

        header { padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid; border-image: linear-gradient(to right, transparent, var(--gold), transparent) 1; }
        .logo-area a img { height: 35px; filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6)); }
        .user-menu { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 18px; overflow: hidden; flex-shrink: 0; }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .user-name { color: #ccc; font-size: 14px; }
        .user-badge { background: var(--gold); color: #000; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; display: none; }
        .user-badge.visible { display: inline; }
        .btn-logout { background: transparent; border: 1px solid #666; color: #ccc; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all 0.3s; }
        .btn-logout:hover { border-color: #c00; color: #c00; }

        .main-content { display: flex; padding-top: 80px; min-height: calc(100vh - 80px); }
        .sidebar { width: 260px; padding: 30px 15px; border-right: 1px solid rgba(255,255,255,0.05); position: fixed; height: calc(100vh - 80px); overflow-y: auto; }

        .sidebar-section { margin-bottom: 25px; }
        .sidebar-title { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; padding-left: 15px; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li { margin-bottom: 3px; }
        .sidebar-menu a { display: flex; align-items: center; gap: 10px; padding: 12px 15px; color: #888; text-decoration: none; border-radius: 8px; transition: all 0.3s; font-size: 14px; cursor: pointer; }
        .sidebar-menu a:hover { background: rgba(212, 175, 55, 0.1); color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .sidebar-menu a.active { background: rgba(212, 175, 55, 0.15); color: var(--gold); }
        .sidebar-menu a .icon { font-size: 18px; }

        .admin-section { display: none; }
        .admin-section.visible { display: block; }
        .admin-menu a { color: var(--gold) !important; border-left: 3px solid var(--gold); }
        .admin-menu a:hover { background: rgba(212, 175, 55, 0.2) !important; }

        .content-area { flex: 1; margin-left: 260px; padding: 30px; min-height: calc(100vh - 80px); }
        
        .section-title { color: var(--gold); font-size: 1.8rem; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }
        .section-title .icon { font-size: 2rem; }

        .welcome-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 30px; }
        .welcome-card h1 { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }
        .welcome-card p { color: #888; font-size: 1rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 25px; text-align: center; transition: all 0.3s; cursor: pointer; }
        .stat-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .stat-card h3 { color: var(--gold); font-size: 2.5rem; margin-bottom: 5px; }
        .stat-card p { color: #666; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .communities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .community-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; overflow: hidden; transition: all 0.3s; }
        .community-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .community-cover { height: 120px; background: linear-gradient(135deg, var(--gold) 0%, #1a1a1a 100%); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .community-info { padding: 20px; }
        .community-info h3 { color: var(--gold); margin-bottom: 8px; font-size: 1.1rem; }
        .community-info p { color: #666; font-size: 0.85rem; margin-bottom: 15px; }
        .btn-participate { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .btn-participate:hover { filter: brightness(1.1); transform: scale(1.05); }
        .btn-participating { background: linear-gradient(180deg, #2a5a2a, #1a3a1a); color: #6f6; border: 1px solid #4a4; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.3s; }
        .btn-participating:hover { filter: brightness(1.2); transform: scale(1.05); }

        .feed-list { display: flex; flex-direction: column; gap: 20px; }
        .scrap-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 25px; position: relative; }
        .scrap-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .scrap-avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; overflow: hidden; flex-shrink: 0; }
        .scrap-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .scrap-user { flex: 1; }
        .scrap-user-name { color: var(--gold); font-weight: bold; font-size: 14px; }
        .scrap-time { color: #555; font-size: 12px; }
        .scrap-content { color: #ccc; font-size: 14px; line-height: 1.6; }
        .scrap-actions { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .scrap-action { background: none; border: none; color: #555; font-size: 12px; cursor: pointer; transition: color 0.3s; }
        .scrap-action:hover { color: var(--gold); }
        .scrap-delete { display: none; position: absolute; top: 15px; right: 15px; background: transparent; border: 1px solid #c00; color: #c00; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .scrap-delete.visible { display: block; }
        .scrap-delete:hover { background: #c00; color: #fff; }

        .photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .photo-item { aspect-ratio: 1; background: var(--dark-box); border: var(--border-style); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; color: #555; font-size: 2rem; }
        .photo-item:hover { border-color: var(--gold); transform: scale(1.02); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        .empty-state { text-align: center; padding: 60px 20px; color: #555; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; filter: grayscale(50%); }
        .empty-state h3 { color: var(--gold); margin-bottom: 10px; font-size: 1.2rem; }
        .empty-state p { font-size: 0.9rem; color: #666; }

        .btn-create { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s; }
        .btn-create:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--dark-box); border: 2px solid var(--gold); border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
        .modal-close:hover { color: var(--gold); }
        .modal h2 { color: var(--gold); margin-bottom: 25px; font-size: 1.5rem; }
        .modal .form-group { margin-bottom: 20px; }
        .modal .form-group label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 8px; }
        .modal .form-group input, .modal .form-group textarea, .modal .form-group select { width: 100%; padding: 12px 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 14px; }
        .modal .form-group textarea { min-height: 80px; resize: vertical; }
        .modal .form-group input:focus, .modal .form-group textarea:focus, .modal .form-group select:focus { border-color: var(--gold); outline: none; }
        .modal .btn-save { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 14px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }
        .modal .btn-save:hover { filter: brightness(1.1); }

        .community-header { position: relative; background: var(--dark-box); border: var(--border-style); border-radius: 12px; overflow: hidden; margin-bottom: 25px; }
        .community-banner { height: 180px; background: linear-gradient(135deg, var(--gold) 0%, #1a1a1a 100%); display: flex; align-items: center; justify-content: center; font-size: 5rem; }
        .community-banner img { width: 100%; height: 100%; object-fit: cover; }
        .community-header-content { padding: 25px; }
        .community-header h1 { color: var(--gold); font-size: 1.8rem; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
        .community-header p { color: #888; font-size: 0.95rem; line-height: 1.5; }
        .community-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn-join { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-join:hover { filter: brightness(1.1); transform: scale(1.05); }
        .btn-leave { background: transparent; border: 1px solid #c00; color: #c00; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-leave:hover { background: #c00; color: #fff; }
        .btn-manage { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; border-radius: 20px; cursor: pointer; }
        .btn-manage:hover { background: var(--gold); color: #000; }

        .members-preview { display: flex; gap: 10px; margin-top: 15px; }
        .member-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 14px; overflow: hidden; flex-shrink: 0; }
        .member-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .topics-list { display: flex; flex-direction: column; gap: 15px; }
        .topic-card { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.3s; }
        .topic-card:hover { border-color: var(--gold); transform: translateX(5px); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .topic-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .topic-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; overflow: hidden; flex-shrink: 0; }
        .topic-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .topic-meta { flex: 1; }
        .topic-title { color: var(--gold); font-weight: bold; font-size: 1rem; margin-bottom: 3px; }
        .topic-author { color: #555; font-size: 0.8rem; }
        .topic-content { color: #aaa; font-size: 0.9rem; line-height: 1.5; margin-bottom: 10px; }
        .topic-stats { display: flex; gap: 20px; color: #555; font-size: 0.8rem; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-create-topic { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 25px; display: inline-flex; align-items: center; gap: 8px; }
        .btn-create-topic:hover { filter: brightness(1.1); }

        .topic-detail { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 30px; margin-bottom: 25px; }
        .topic-detail h2 { color: var(--gold); font-size: 1.5rem; margin-bottom: 20px; }
        .topic-detail-content { color: #ccc; line-height: 1.8; font-size: 1rem; }
        .comments-section { margin-top: 30px; }
        .comments-section h3 { color: var(--gold); margin-bottom: 15px; font-size: 1.1rem; }
        .comment { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .comment-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 14px; overflow: hidden; flex-shrink: 0; }
        .comment-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .comment-content { flex: 1; min-width: 0; }
        .comment-author { color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .comment-text { color: #ccc; font-size: 0.9rem; margin-top: 5px; line-height: 1.5; }
        .comment-time { color: #555; font-size: 0.75rem; margin-top: 5px; }
        .new-comment { margin-top: 20px; display: flex; gap: 12px; }
        .new-comment textarea { flex: 1; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; min-height: 60px; resize: vertical; }
        .new-comment button { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .back-link { color: var(--gold); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; }
        .back-link:hover { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

        .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: center; }
        .alert.show { display: block; }
        .alert-success { background: rgba(50, 200, 50, 0.15); border: 1px solid rgba(50, 200, 50, 0.5); color: #50c850; }
        .alert-error { background: rgba(200, 50, 50, 0.15); border: 1px solid rgba(200, 50, 50, 0.5); color: #ff6b6b; }

        .new-scrap-form { background: var(--dark-box); border: var(--border-style); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
        .new-scrap-form textarea { width: 100%; min-height: 80px; padding: 15px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; resize: vertical; margin-bottom: 15px; }
        .new-scrap-form textarea:focus { border-color: var(--gold); outline: none; }
        .new-scrap-form button { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; font-size: 0.75rem; color: #666; margin-left: 260px; }
        footer a { color: #999; text-decoration: underline; margin: 0 8px; }
        footer a:hover { color: var(--gold); }

        @media (max-width: 800px) { .sidebar { display: none; } .content-area { margin-left: 0; } footer { margin-left: 0; } }

        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 16px 24px; border-radius: 12px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease; box-shadow: 0 10px 40px rgba(0,0,0,0.5); min-width: 280px; max-width: 400px; }
        .toast.hide { animation: slideOut 0.3s ease forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        .toast-success { background: linear-gradient(135deg, rgba(212, 175, 55, 0.95), rgba(180, 148, 31, 0.95)); color: #000; border-left: 4px solid #fff; }
        .toast-error { background: linear-gradient(135deg, rgba(180, 50, 50, 0.95), rgba(120, 30, 30, 0.95)); color: #fff; border-left: 4px solid #ff6b6b; }
        .toast-info { background: linear-gradient(135deg, rgba(50, 150, 200, 0.95), rgba(30, 100, 150, 0.95)); color: #fff; border-left: 4px solid #6bc5ff; }
        .toast-icon { font-size: 20px; }

        .scrap-like-btn { background: none; border: none; color: #555; font-size: 12px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 15px; }
        .scrap-like-btn:hover { color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .scrap-like-btn.liked { color: #ff4757; }
        .scrap-like-btn.liked .heart-icon { fill: #ff4757; stroke: #ff4757; }
        .heart-icon { width: 16px; height: 16px; }

        .scrap-comments { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .comments-container { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
        .comment-scrap { display: flex; gap: 10px; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .comment-scrap-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 12px; overflow: hidden; flex-shrink: 0; }
        .comment-scrap-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .comment-scrap-content { flex: 1; min-width: 0; }
        .comment-scrap-author { color: var(--gold); font-weight: bold; font-size: 0.8rem; }
        .comment-scrap-text { color: #aaa; font-size: 0.85rem; margin-top: 3px; line-height: 1.4; }
        .comment-scrap-time { color: #555; font-size: 0.7rem; margin-top: 3px; }
        .comment-form { display: flex; gap: 10px; margin-top: 10px; }
        .comment-form textarea { flex: 1; padding: 8px 12px; background: #111; border: 1px solid #333; border-radius: 20px; color: #fff; font-size: 13px; min-height: 36px; resize: none; }
        .comment-form textarea:focus { border-color: var(--gold); outline: none; }
        .comment-form button { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #000; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="#" onclick="loadSection('home'); event.preventDefault();"><img src="imagens/LOGO ELO FINAL.png" alt="ELO"></a>
        </div>
        <div class="user-menu">
            <div class="user-avatar" id="userAvatar">?</div>
            <span class="user-name" id="userName">Carregando...</span>
            <span class="user-badge" id="userBadge">Admin</span>
            <button class="btn-logout" id="logoutBtn">Sair</button>
        </div>
    </header>

    <div class="main-content">
        <nav class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Menu</div>
                <ul class="sidebar-menu">
                    <li><a href="#" onclick="loadSection('home'); event.preventDefault();" class="active" data-section="home"><span class="icon">🏠</span> Início</a></li>
                    <li><a href="#" onclick="loadSection('comunidades'); event.preventDefault();" data-section="comunidades"><span class="icon">👥</span> Comunidades</a></li>
                    <li><a href="#" onclick="loadSection('recados'); event.preventDefault();" data-section="recados"><span class="icon">📝</span> Recados</a></li>
                    <li><a href="#" onclick="loadSection('fotos'); event.preventDefault();" data-section="fotos"><span class="icon">📷</span> Fotos</a></li>
                </ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Pessoal</div>
                <ul class="sidebar-menu">
                    <li><a href="#" onclick="loadSection('config'); event.preventDefault();" data-section="config"><span class="icon">⚙️</span> Configurações</a></li>
                    <li><a href="#" onclick="loadSection('privacidade'); event.preventDefault();" data-section="privacidade"><span class="icon">🔒</span> Privacidade</a></li>
                </ul>
            </div>
            <div class="sidebar-section admin-section" id="adminSection">
                <div class="sidebar-title">⚠️ Administração</div>
                <ul class="sidebar-menu admin-menu">
                    <li><a href="#" onclick="loadSection('admin'); event.preventDefault();" data-section="admin"><span class="icon">🛡️</span> Painel de Controle</a></li>
                </ul>
            </div>
        </nav>

        <main class="content-area" id="mainContent"></main>
    </div>

    <div class="modal" id="createCommunityModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2>🏘️ Criar Nova Comunidade</h2>
            <form id="createCommunityForm">
                <div class="form-group">
                    <label>Nome da Comunidade *</label>
                    <input type="text" id="communityName" placeholder="Ex: Música Clássica" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="communityDesc" placeholder="Qual o objetivo da comunidade?"></textarea>
                </div>
                <div class="form-group">
                    <label>URL da Imagem de Capa</label>
                    <input type="url" id="communityImage" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="communityCategory">
                        <option value="outros">Outros</option>
                        <option value="musica">🎵 Música</option>
                        <option value="dev">💻 Desenvolvimento</option>
                        <option value="games">🎮 Games</option>
                        <option value="filmes">🎬 Filmes</option>
                        <option value="livros">📚 Livros</option>
                        <option value="esportes">⚽ Esportes</option>
                    </select>
                </div>
                <button type="submit" class="btn-save">Criar Comunidade</button>
            </form>
        </div>
    </div>

    <div class="modal" id="createTopicModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeTopicModal()">&times;</button>
            <h2>💬 Criar Novo Tópico</h2>
            <form id="createTopicForm">
                <div class="form-group">
                    <label>Título do Tópico *</label>
                    <input type="text" id="topicTitle" placeholder="Qual o assunto?" required>
                </div>
                <div class="form-group">
                    <label>Conteúdo</label>
                    <textarea id="topicContent" placeholder="Descreva sua dúvida ou topic..."></textarea>
                </div>
                <button type="submit" class="btn-save">Criar Tópico</button>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <footer>
        &copy; 2026 ELO - <a href="sobre.html">Sobre</a> - <a href="seguranca.html">Segurança</a> - <a href="privacidade.html">Privacidade</a> - <a href="termos.html">Termos</a>
    </footer>

    <script src="config.js"></script>
    <script>
        let currentUser = null;
        let isAdmin = false;

        function showToast(message, type = 'success', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            toast.innerHTML = `<span class="toast-icon">${icons[type] || '✓'}</span><span>${message}</span>`;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            currentUser = user;

            let perfil = await ensureProfile(user);
            isAdmin = perfil?.is_admin || false;
            
            const fullName = perfil?.nome_completo || user.user_metadata?.full_name || user.email;
            const firstName = fullName.split(' ')[0];
            const avatarUrl = perfil?.avatar_url;

            document.getElementById('userName').textContent = fullName;
            const avatarEl = document.getElementById('userAvatar');
            if (avatarUrl) {
                avatarEl.innerHTML = `<img src="${avatarUrl}" alt="Avatar">`;
            } else {
                avatarEl.textContent = firstName.charAt(0).toUpperCase();
            }

            if (isAdmin) {
                document.getElementById('userBadge').classList.add('visible');
                document.getElementById('adminSection').classList.add('visible');
            }

            loadSection('home');
        }

        async function ensureProfile(user) {
            const { data: perfil, error } = await supabaseClient.from('perfis').select('*').eq('id', user.id).single();
            if (error || !perfil) {
                const fullName = user.user_metadata?.full_name || user.email;
                const { data: newPerfil } = await supabaseClient.from('perfis').insert({ id: user.id, nome_completo: fullName, is_admin: false }).select().single();
                return newPerfil || { is_admin: false, nome_completo: fullName };
            }
            return perfil;
        }

        function loadSection(section) {
            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            const activeLink = document.querySelector(`.sidebar-menu a[data-section="${section}"]`);
            if (activeLink) activeLink.classList.add('active');

            const content = document.getElementById('mainContent');
            
            switch(section) {
                case 'home': loadHome(); break;
                case 'comunidades': loadComunidades(); break;
                case 'recados': loadRecados(); break;
                case 'fotos': loadFotos(); break;
                case 'config': window.location.href = 'config.html'; break;
                case 'admin': window.location.href = 'admin.html'; break;
                default: loadHome();
            }
        }

        async function loadHome() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const perfil = await ensureProfile(user);
            const firstName = (perfil?.nome_completo || user.user_metadata?.full_name || 'Usuário').split(' ')[0];

            let statsHtml = '';
            if (isAdmin) {
                const { count: userCount } = await supabaseClient.from('perfis').select('*', { count: 'exact', head: true });
                const { count: scrapCount } = await supabaseClient.from('recados').select('*', { count: 'exact', head: true });
                const { count: communityCount } = await supabaseClient.from('comunidades').select('*', { count: 'exact', head: true });
                statsHtml = `
                    <div class="stats-grid">
                        <div class="stat-card"><h3>${userCount || 0}</h3><p>Usuários</p></div>
                        <div class="stat-card"><h3>${communityCount || 0}</h3><p>Comunidades</p></div>
                        <div class="stat-card"><h3>${scrapCount || 0}</h3><p>Recados</p></div>
                    </div>`;
            }

            document.getElementById('mainContent').innerHTML = `
                <div class="welcome-card">
                    <h1>Olá, ${firstName}!</h1>
                    <p>Bem-vindo ao ELO. Explore comunidades, faça conexões e compartilhe conhecimento.</p>
                </div>
                ${statsHtml}
                <div class="section-title"><span class="icon">📝</span> Recados Recentes</div>
                <div id="recentRecados"></div>
            `;
            loadRecentRecados();
        }

        async function loadRecentRecados() {
            const { data: recados } = await supabaseClient.from('recados').select('*').order('created_at', { ascending: false }).limit(5);
            const container = document.getElementById('recentRecados');
            
            if (!recados || recados.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>Nenhum recado ainda</h3><p>Seja o primeiro a escrever algo!</p></div>`;
                return;
            }

            let html = '';
            for (let r of recados) {
                let perfil = { avatar_url: null, nome_completo: 'Usuário' };
                if (r.usuario_id) {
                    const { data: p } = await supabaseClient.from('perfis').select('avatar_url, nome_completo').eq('id', r.usuario_id).single();
                    if (p) perfil = p;
                }
                const avatar = perfil.avatar_url || null;
                const nome = perfil.nome_completo || 'Usuário';
                const initial = nome.charAt(0).toUpperCase();
                const avatarHtml = avatar ? `<img src="${avatar}" alt="${nome}">` : `<div style="background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:50%;width:45px;height:45px;">${initial}</div>`;
                const curtidas = r.curtidas || 0;
                const isOwnScrap = currentUser.id === r.usuario_id;
                
                const { count: commentCount } = await supabaseClient
                    .from('comentarios_recados')
                    .select('*', { count: 'exact', head: true })
                    .eq('recado_id', r.id);
                const numComments = commentCount || 0;
                
                const likeBtnDisabled = isOwnScrap ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : '';
                const likeBtnClick = isOwnScrap ? '' : `onclick="curtirRecado('${r.id}')"`;
                
                html += `
                    <div class="scrap-card" id="scrap-home-${r.id}">
                        <div class="scrap-header">
                            <div class="scrap-avatar">${avatarHtml}</div>
                            <div class="scrap-user">
                                <div class="scrap-user-name">${nome}</div>
                                <div class="scrap-time">${new Date(r.created_at).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' })}</div>
                            </div>
                        </div>
                        <div class="scrap-content">${r.conteudo}</div>
                        <div class="scrap-actions">
                            <button class="scrap-like-btn" ${likeBtnDisabled} id="like-btn-${r.id}" ${likeBtnClick}>
                                <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                                <span id="like-count-${r.id}">${curtidas}</span>
                            </button>
                            <button class="scrap-action" onclick="toggleComentarios('${r.id}')">💬 Comentários (${numComments})</button>
                        </div>
                        <div class="scrap-comments" id="comments-area-${r.id}" style="display:none;">
                            <div class="comments-container" id="comments-list-${r.id}" data-scrap-author="${r.usuario_id}"></div>
                            <div class="comment-form">
                                <textarea id="comment-input-${r.id}" placeholder="Escreva um comentário..."></textarea>
                                <button onclick="postarComentarioRecado('${r.id}')">Enviar</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = '<div class="feed-list">' + html + '</div>';
            for (let r of recados) {
                carregarComentariosRecado(r.id);
            }
        }

        async function loadComunidades() {
            document.getElementById('mainContent').innerHTML = `
                <div class="section-title"><span class="icon">👥</span> Comunidades</div>
                <button class="btn-create" onclick="openModal()">➕ Criar Nova Comunidade</button>
                <div id="communitiesGrid" class="communities-grid"></div>
            `;
            
            const { data: comunidades, error } = await supabaseClient.from('comunidades').select('*').order('created_at', { ascending: false });
            const { data: memberships } = await supabaseClient
                .from('membros_comunidades')
                .select('comunidade_id')
                .eq('usuario_id', currentUser.id);
            
            const participatingIds = memberships?.map(m => m.comunidade_id) || [];
            const grid = document.getElementById('communitiesGrid');

            if (error) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Erro ao carregar</h3><p>${error.message}</p></div>`;
                return;
            }

            if (!comunidades || comunidades.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">🏘️</div><h3>Nenhuma comunidade ainda</h3><p>Seja o primeiro a criar uma comunidade!</p></div>`;
                return;
            }

            grid.innerHTML = comunidades.map(c => {
                const isParticipating = participatingIds.includes(c.id);
                const btnClass = isParticipating ? 'btn-participating' : 'btn-participate';
                const btnText = isParticipating ? '✓ Participando' : 'Participar';
                const btnAction = isParticipating ? `abrirComunidade('${c.id}')` : `participarComunidade('${c.id}')`;
                
                return `
                    <div class="community-card" onclick="${btnAction}" style="cursor:pointer;">
                        <div class="community-cover">${c.icone || '👥'}</div>
                        <div class="community-info">
                            <h3>${c.nome}</h3>
                            <p>${c.descricao || ''}</p>
                            <button class="${btnClass}" onclick="event.stopPropagation(); ${isParticipating ? `abrirComunidade('${c.id}')` : `participarComunidade('${c.id}')`}">${btnText}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function abrirComunidade(id) {
            const { data: comunidade, error } = await supabaseClient.from('comunidades').select('*').eq('id', id).single();
            if (error || !comunidade) {
                showToast('Erro ao abrir comunidade', 'error');
                return;
            }

            const { data: topicos, error: topError } = await supabaseClient
                .from('topicos')
                .select('*')
                .eq('comunidade_id', id)
                .order('criado_em', { ascending: false });

            console.log('Tópicos:', topicos);

            const { data: membership } = await supabaseClient
                .from('membros_comunidades')
                .select('*')
                .eq('comunidade_id', id)
                .eq('usuario_id', currentUser.id)
                .single();

            const isParticipating = !!membership;
            const isCreator = comunidade.criado_por && comunidade.criado_por === currentUser.id;
            const canManage = isAdmin || isCreator;
            const bannerHtml = comunidade.imagem_url ? `<img src="${comunidade.imagem_url}" alt="${comunidade.nome}">` : comunidade.icone || '👥';

            const joinBtnClass = isParticipating ? 'btn-leave' : 'btn-join';
            const joinBtnText = isParticipating ? '🚪 Sair da Comunidade' : '✓ Participar';
            const joinBtnAction = isParticipating ? `sairComunidade('${id}')` : `participarComunidade('${id}')`;

            const manageBtn = canManage ? `<button class="btn-manage" onclick="event.stopPropagation()">🛠️ Gerenciar</button>` : '';

            document.getElementById('mainContent').innerHTML = `
                <a class="back-link" onclick="loadComunidades(); event.preventDefault();">← Voltar para Comunidades</a>
                <div class="community-header" onclick="event.preventDefault();">
                    <div class="community-banner">${bannerHtml}</div>
                    <div class="community-header-content">
                        <h1>${comunidade.icone || ''} ${comunidade.nome}</h1>
                        <p>${comunidade.descricao || ''}</p>
                        <div class="members-preview" id="membersPreview"></div>
                        <div class="community-actions">
                            <button class="${joinBtnClass}" onclick="${joinBtnAction}">${joinBtnText}</button>
                            ${manageBtn}
                        </div>
                    </div>
                </div>
                ${isParticipating ? `<button class="btn-create-topic" onclick="openTopicModal('${id}')">➕ Criar Tópico</button>` : '<div class="alert" style="background:rgba(212,175,55,0.1);border:1px solid var(--gold);padding:15px;border-radius:8px;margin-bottom:25px;text-align:center;">💡 Participe da comunidade para criar tópicos e interagir!</div>'}
                <div class="section-title"><span class="icon">💬</span> Tópicos da Comunidade</div>
                <div id="topicsList" class="topics-list"></div>
            `;

            renderizarTopicos(topicos, id);
        }

        async function renderizarTopicos(topicos, comunidadeId) {
            const container = document.getElementById('topicsList');
            
            const { data: topicosList, error } = await supabaseClient
                .from('topicos')
                .select('*')
                .eq('comunidade_id', comunidadeId)
                .order('criado_em', { ascending: false });
            
            console.log('Tópicos:', topicosList, 'Erro:', error);
            
            if (error || !topicosList || topicosList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <h3>Ainda não há tesouros aqui</h3>
                        <p>Comece uma discussão e seja o primeiro a contribuir!</p>
                    </div>`;
                return;
            }

            let html = '';
            for (let t of topicosList) {
                const autorId = t.autor_id;
                let nome = 'Usuário';
                let avatarUrl = null;
                
                if (autorId) {
                    const { data: perfil } = await supabaseClient
                        .from('perfis')
                        .select('nome_completo, avatar_url')
                        .eq('id', autorId)
                        .single();
                    if (perfil) {
                        nome = perfil.nome_completo || 'Usuário';
                        avatarUrl = perfil.avatar_url;
                    }
                }
                
                const initial = nome.charAt(0).toUpperCase();
                const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" alt="${nome}">` : initial;
                const time = new Date(t.criado_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                const { count } = await supabaseClient
                    .from('comentarios')
                    .select('*', { count: 'exact', head: true })
                    .eq('topico_id', t.id);
                const commentCount = count || 0;

                html += `
                    <div class="topic-card" onclick="abrirTopico('${t.id}')">
                        <div class="topic-header">
                            <div class="topic-avatar">${avatarHtml}</div>
                            <div class="topic-meta">
                                <div class="topic-title">${t.titulo}</div>
                                <div class="topic-author">Postado por ${nome} • ${time}</div>
                            </div>
                        </div>
                        ${t.conteudo ? `<div class="topic-content">${t.conteudo.substring(0, 150)}${t.conteudo.length > 150 ? '...' : ''}</div>` : ''}
                        <div class="topic-stats">💬 ${commentCount} resposta${commentCount !== 1 ? 's' : ''}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function participarComunidade(id) {
            const { error } = await supabaseClient.from('membros_comunidades').insert({
                comunidade_id: id,
                usuario_id: currentUser.id
            });

            if (error) {
                showToast('Erro ao participar', 'error');
            } else {
                showToast('Você agora é membro desta comunidade!', 'success');
                abrirComunidade(id);
            }
        }

        async function sairComunidade(id) {
            if (!confirm('Tem certeza que deseja sair desta comunidade?')) return;

            const { error } = await supabaseClient
                .from('membros_comunidades')
                .delete()
                .eq('comunidade_id', id)
                .eq('usuario_id', currentUser.id);

            if (error) {
                showToast('Erro ao sair', 'error');
            } else {
                showToast('Você saiu da comunidade', 'info');
                loadComunidades();
            }
        }

        async function abrirTopico(id) {
            const { data: topico } = await supabaseClient.from('topicos').select('*').eq('id', id).single();
            if (!topico) return;

            const { data: comentarios } = await supabaseClient.from('comentarios').select('*').eq('topico_id', id).order('criado_em', { ascending: true });

            let autorNome = 'Usuário';
            let autorAvatar = null;
            if (topico.autor_id) {
                const { data: autor } = await supabaseClient.from('perfis').select('nome_completo, avatar_url').eq('id', topico.autor_id).single();
                if (autor) {
                    autorNome = autor.nome_completo || 'Usuário';
                    autorAvatar = autor.avatar_url;
                }
            }
            const autorInitial = autorNome.charAt(0).toUpperCase();
            const autorAvatarHtml = autorAvatar ? `<img src="${autorAvatar}" alt="${autorNome}">` : autorInitial;
            const time = new Date(topico.criado_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });

            let commentsHtml = '';
            if (comentarios && comentarios.length > 0) {
                for (let c of comentarios) {
                    let cNome = 'Usuário';
                    let cAvatar = null;
                    if (c.autor_id) {
                        const { data: cAutor } = await supabaseClient.from('perfis').select('nome_completo, avatar_url').eq('id', c.autor_id).single();
                        if (cAutor) {
                            cNome = cAutor.nome_completo || 'Usuário';
                            cAvatar = cAutor.avatar_url;
                        }
                    }
                    const cInitial = cNome.charAt(0).toUpperCase();
                    const cAvatarHtml = cAvatar ? `<img src="${cAvatar}" alt="${cNome}">` : cInitial;
                    const cTime = new Date(c.criado_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    commentsHtml += `
                        <div class="comment">
                            <div class="comment-avatar">${cAvatarHtml}</div>
                            <div class="comment-content">
                                <div class="comment-author">${cNome}</div>
                                <div class="comment-text">${c.texto}</div>
                                <div class="comment-time">${cTime}</div>
                            </div>
                        </div>
                    `;
                }
            } else {
                commentsHtml = '<p style="color: #555;">Nenhum comentário ainda.</p>';
            }

            document.getElementById('mainContent').innerHTML = `
                <a class="back-link" onclick="abrirComunidade('${topico.comunidade_id}'); event.preventDefault();">← Voltar para Comunidade</a>
                <div class="topic-detail">
                    <div class="topic-header">
                        <div class="topic-avatar" style="width:50px;height:50px;font-size:20px;">${autorAvatarHtml}</div>
                        <div class="topic-meta">
                            <div class="topic-title" style="font-size:1.3rem;">${topico.titulo}</div>
                            <div class="topic-author">Por ${autorNome} • ${time}</div>
                        </div>
                    </div>
                    <div class="topic-detail-content">${topico.conteudo || ''}</div>
                </div>
                <div class="comments-section">
                    <h3>💬 Comentários (${comentarios?.length || 0})</h3>
                    <div id="commentsList">${commentsHtml}</div>
                    <div class="new-comment">
                        <textarea id="newCommentText" placeholder="Escreva um comentário..."></textarea>
                        <button onclick="postarComentario('${id}')">Enviar</button>
                    </div>
                </div>
            `;
        }

        async function postarComentario(topicoId) {
            const texto = document.getElementById('newCommentText').value.trim();
            if (!texto) return;

            await supabaseClient.from('comentarios').insert({
                topico_id: topicoId,
                autor_id: currentUser.id,
                texto: texto
            });

            abrirTopico(topicoId);
        }

        function openTopicModal(communityId) {
            document.getElementById('createTopicModal').setAttribute('data-community', communityId);
            document.getElementById('createTopicModal').classList.add('show');
        }

        function closeTopicModal() {
            document.getElementById('createTopicModal').classList.remove('show');
            document.getElementById('createTopicForm').reset();
        }

        document.getElementById('createTopicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const communityId = document.getElementById('createTopicModal').getAttribute('data-community');
            const titulo = document.getElementById('topicTitle').value.trim();
            const conteudo = document.getElementById('topicContent').value.trim();

            if (!titulo) {
                showToast('O título do tópico é obrigatório!', 'info');
                return;
            }

            const { error } = await supabaseClient.from('topicos').insert({
                comunidade_id: communityId,
                autor_id: currentUser.id,
                titulo: titulo,
                conteudo: conteudo
            });

            if (error) {
                showToast('Erro ao criar tópico', 'error');
            } else {
                showToast('Tópico criado com sucesso!', 'success');
                closeTopicModal();
                abrirComunidade(communityId);
            }
        });

        function openModal() {
            document.getElementById('createCommunityModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('createCommunityModal').classList.remove('show');
        }

        document.getElementById('createCommunityForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nome = document.getElementById('communityName').value.trim();
            const descricao = document.getElementById('communityDesc').value.trim();
            const imagem_url = document.getElementById('communityImage').value.trim();
            const categoria = document.getElementById('communityCategory').value;

            if (!nome) {
                showToast('O nome da comunidade é obrigatório!', 'info');
                return;
            }

            const icones = { musica: '🎵', dev: '💻', games: '🎮', filmes: '🎬', livros: '📚', esportes: '⚽' };
            const icone = icones[categoria] || '👥';

            const { error } = await supabaseClient.from('comunidades').insert({
                nome: nome,
                descricao: descricao,
                imagem_url: imagem_url || null,
                icone: icone,
                categoria: categoria,
                criado_por: currentUser.id
            });

            if (error) {
                showToast('Erro ao criar comunidade', 'error');
            } else {
                closeModal();
                document.getElementById('createCommunityForm').reset();
                loadComunidades();
            }
        });

        async function loadRecados() {
            document.getElementById('mainContent').innerHTML = `
                <div class="section-title"><span class="icon">📝</span> Recados</div>
                <div class="alert alert-success" id="scrapAlert"></div>
                <div class="new-scrap-form">
                    <textarea id="scrapText" placeholder="Escreva algo para a comunidade..."></textarea>
                    <button id="postScrapBtn" onclick="postScrap()">Publicar</button>
                </div>
                <div id="recadosList"></div>
            `;
            
            const { data: recados } = await supabaseClient.from('recados').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('recadosList');

            if (!recados || recados.length === 0) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>Nenhum recado ainda</h3><p>Seja o primeiro a escrever algo!</p></div>`;
                return;
            }

            let html = '';
            for (let r of recados) {
                let perfil = { avatar_url: null, nome_completo: 'Usuário' };
                if (r.usuario_id) {
                    const { data: p } = await supabaseClient.from('perfis').select('avatar_url, nome_completo').eq('id', r.usuario_id).single();
                    if (p) perfil = p;
                }
                const canDelete = isAdmin || r.usuario_id === currentUser.id;
                const avatar = perfil.avatar_url || null;
                const nome = perfil.nome_completo || 'Usuário';
                const initial = nome.charAt(0).toUpperCase();
                const time = new Date(r.created_at).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const avatarHtml = avatar ? `<img src="${avatar}" alt="${nome}">` : initial;
                const deleteBtn = canDelete ? `<button class="scrap-delete" onclick="deleteScrap('${r.id}')">🗑️ Apagar</button>` : '';
                
                const curtidas = r.curtidas || 0;
                const isOwnScrap = currentUser.id === r.usuario_id;
                
                const { count: commentCount } = await supabaseClient
                    .from('comentarios_recados')
                    .select('*', { count: 'exact', head: true })
                    .eq('recado_id', r.id);
                const numComments = commentCount || 0;
                
                const likeBtnDisabled = isOwnScrap ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : '';
                const likeBtnClick = isOwnScrap ? '' : `onclick="curtirRecado('${r.id}')"`;
                
                html += `
                    <div class="scrap-card" id="scrap-${r.id}">
                        ${deleteBtn}
                        <div class="scrap-header">
                            <div class="scrap-avatar">${avatarHtml}</div>
                            <div class="scrap-user">
                                <div class="scrap-user-name">${nome}</div>
                                <div class="scrap-time">${time}</div>
                            </div>
                        </div>
                        <div class="scrap-content">${r.conteudo}</div>
                        <div class="scrap-actions">
                            <button class="scrap-like-btn" ${likeBtnDisabled} id="like-btn-${r.id}" ${likeBtnClick}>
                                <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                                <span id="like-count-${r.id}">${curtidas}</span>
                            </button>
                            <button class="scrap-action" onclick="toggleComentarios('${r.id}')">💬 Comentários (${numComments})</button>
                        </div>
                        <div class="scrap-comments" id="comments-area-${r.id}" style="display:none;">
                            <div class="comments-container" id="comments-list-${r.id}"></div>
                            <div class="comment-form">
                                <textarea id="comment-input-${r.id}" placeholder="Escreva um comentário..."></textarea>
                                <button onclick="postarComentarioRecado('${r.id}')">Enviar</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            list.innerHTML = '<div class="feed-list">' + html + '</div>';
            for (let r of recados) {
                carregarComentariosRecado(r.id);
            }
        }

        async function curtirRecado(id) {
            console.log('Curtindo recado:', id);
            console.log('currentUser:', currentUser);
            
            const btn = document.getElementById(`like-btn-${id}`);
            if (!btn) {
                console.error('Botão não encontrado:', `like-btn-${id}`);
                showToast('Erro: botão não encontrado', 'error');
                return;
            }
            if (btn.classList.contains('liked')) {
                showToast('Você já curtiu este recado!', 'info');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('recados')
                    .select('curtidas')
                    .eq('id', id)
                    .single();

                if (error) {
                    console.error('Erro ao buscar recado:', error);
                    showToast('Erro ao curtir: ' + error.message, 'error');
                    return;
                }

                const newCount = (data?.curtidas || 0) + 1;
                console.log('Nova contagem:', newCount);

                const { error: updateError } = await supabaseClient
                    .from('recados')
                    .update({ curtidas: newCount })
                    .eq('id', id);

                if (updateError) {
                    console.error('Erro ao atualizar:', updateError);
                    showToast('Erro ao curtir: ' + updateError.message, 'error');
                    return;
                }

                const countEl = document.getElementById(`like-count-${id}`);
                if (countEl) countEl.textContent = newCount;
                btn.classList.add('liked');
                btn.querySelector('.heart-icon').setAttribute('fill', '#ff4757');
                showToast('Curtido! ❤️', 'success');
            } catch (e) {
                console.error('Erro:', e);
                showToast('Erro ao curtir', 'error');
            }
        }

        function toggleComentarios(id) {
            console.log('Abrindo comentários para:', id);
            const area = document.getElementById(`comments-area-${id}`);
            if (!area) {
                console.error('Área de comentários não encontrada:', `comments-area-${id}`);
                showToast('Erro: área de comentários não encontrada', 'error');
                return;
            }
            if (area.style.display === 'none') {
                area.style.display = 'block';
                const input = document.getElementById(`comment-input-${id}`);
                if (input) input.focus();
            } else {
                area.style.display = 'none';
            }
        }

        async function carregarComentariosRecado(recadoId) {
            try {
                const { data: recado } = await supabaseClient.from('recados').select('usuario_id').eq('id', recadoId).single();
                const scrapAuthorId = recado?.usuario_id;

                const { data: comentarios, error } = await supabaseClient
                    .from('comentarios_recados')
                    .select('*')
                    .eq('recado_id', recadoId)
                    .order('criado_em', { ascending: true });

                if (error) {
                    console.error('Erro ao carregar comentários:', error);
                    return;
                }

                const container = document.getElementById(`comments-list-${recadoId}`);
                if (!container) return;

                if (!comentarios || comentarios.length === 0) {
                    container.innerHTML = '<p style="color:#555;font-size:0.8rem;padding:5px;">Nenhum comentário ainda. Seja o primeiro!</p>';
                    return;
                }

                let html = '';
                for (let c of comentarios) {
                    let perfil = { avatar_url: null, nome_completo: 'Usuário' };
                    if (c.autor_id) {
                        const { data: p } = await supabaseClient.from('perfis').select('avatar_url, nome_completo').eq('id', c.autor_id).single();
                        if (p) perfil = p;
                    }
                    const avatar = perfil.avatar_url || null;
                    const nome = perfil.nome_completo || 'Usuário';
                    const initial = nome.charAt(0).toUpperCase();
                    const avatarHtml = avatar ? `<img src="${avatar}" alt="${nome}">` : initial;
                    const time = new Date(c.criado_em).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    
                    const isAuthor = c.autor_id === scrapAuthorId;
                    const authorStyle = isAuthor ? 'border:1px solid var(--gold);border-radius:8px;padding:8px;margin-bottom:5px;' : '';
                    const authorBadge = isAuthor ? '<span style="background:var(--gold);color:#000;font-size:9px;padding:2px 6px;border-radius:4px;margin-left:5px;font-weight:bold;">Autor</span>' : '';

                    html += `
                        <div class="comment-scrap" style="${authorStyle}">
                            <div class="comment-scrap-avatar">${avatarHtml}</div>
                            <div class="comment-scrap-content">
                                <div class="comment-scrap-author">${nome} ${authorBadge}</div>
                                <div class="comment-scrap-text">${c.conteudo}</div>
                                <div class="comment-scrap-time">${time}</div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (e) {
                console.error('Erro ao carregar comentários:', e);
            }
        }

        async function postarComentarioRecado(recadoId) {
            const input = document.getElementById(`comment-input-${recadoId}`);
            if (!input) return;
            
            const texto = input.value.trim();
            if (!texto) {
                showToast('Digite um comentário!', 'info');
                return;
            }

            try {
                const { error } = await supabaseClient.from('comentarios_recados').insert({
                    recado_id: recadoId,
                    autor_id: currentUser.id,
                    conteudo: texto
                });

                if (error) {
                    console.error('Erro ao postar comentário:', error);
                    showToast('Erro ao postar comentário. Execute o SQL no Supabase.', 'error');
                    return;
                }

                input.value = '';
                await carregarComentariosRecado(recadoId);
                showToast('Comentário adicionado!', 'success');
            } catch (e) {
                console.error('Erro:', e);
                showToast('Erro ao postar comentário', 'error');
            }
        }

        async function deleteScrap(id) {
            if (!confirm('Tem certeza que deseja apagar este recado?')) return;
            const { error } = await supabaseClient.from('recados').delete().eq('id', id);
            if (error) {
                showToast('Erro ao apagar recado', 'error');
            } else {
                showToast('Recado apagado!', 'success');
                loadRecados();
            }
        }

        async function postScrap() {
            const text = document.getElementById('scrapText').value.trim();
            if (!text) return;

            const btn = document.getElementById('postScrapBtn');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            const { error } = await supabaseClient.from('recados').insert({
                usuario_id: currentUser.id,
                conteudo: text,
                curtidas: 0
            });

            if (error) {
                showToast('Erro ao postar recado', 'error');
                btn.disabled = false;
                btn.textContent = 'Publicar';
            } else {
                document.getElementById('scrapText').value = '';
                btn.disabled = false;
                btn.textContent = 'Publicar';
                showToast('Recado publicado!', 'success');
                loadRecados();
            }
        }

        async function loadFotos() {
            document.getElementById('mainContent').innerHTML = `
                <div class="section-title"><span class="icon">📷</span> Fotos</div>
                <div class="photos-grid" id="photosGrid"></div>
            `;

            const { data: fotos } = await supabaseClient.from('fotos').select('*').eq('usuario_id', currentUser.id).order('created_at', { ascending: false });
            const grid = document.getElementById('photosGrid');

            if (!fotos || fotos.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📷</div><h3>Nenhuma foto ainda</h3><p>Suas fotos aparecerão aqui!</p></div>`;
                return;
            }

            grid.innerHTML = fotos.map(f => `<div class="photo-item"><img src="${f.url}" alt="Foto"></div>`).join('');
        }

        function showAlert(message, type) {
            const alert = document.getElementById('scrapAlert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => alert.classList.remove('show'), 3000);
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        });

        init();
    </script>

</body>
</html>
